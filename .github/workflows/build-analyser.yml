name: Build ScySeq Analyser

on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_name: ScySeqTools-Analyser-windows-x64
            archive_base: ScySeqTools-Analyser-windows-x64
            archive_extension: .zip
            spec: packaging/pyinstaller/scyseq-analyser-windows.spec
            platform: windows
            archive_source: ScySeq Analyser.exe

          - os: ubuntu-22.04
            artifact_name: ScySeqTools-Analyser-ubuntu-22.04-x64
            archive_base: ScySeqTools-Analyser-ubuntu-22.04-x64
            archive_extension: .tar.gz
            spec: packaging/pyinstaller/scyseq-analyser-linux.spec
            platform: linux
            archive_source: scyseq-analyser

          - os: macos-15-intel
            artifact_name: ScySeqTools-Analyser-macos-x64
            archive_base: ScySeqTools-Analyser-macos-x64
            archive_extension: .zip
            spec: packaging/pyinstaller/scyseq-analyser-macos.spec
            platform: macos
            archive_source: ScySeq Analyser.app

          - os: macos-15
            artifact_name: ScySeqTools-Analyser-macos-arm64
            archive_base: ScySeqTools-Analyser-macos-arm64
            archive_extension: .zip
            spec: packaging/pyinstaller/scyseq-analyser-macos.spec
            platform: macos
            archive_source: ScySeq Analyser.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Run tests
        run: python -m pytest

      - name: Import smoke check
        run: python -c "import scyseqtools.analyser.main; print('analyser ok')"

      - name: Build app
        run: pyinstaller --clean --noconfirm "${{ matrix.spec }}"

      - name: Name Windows app with tag version
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $source = "dist\${{ matrix.archive_source }}"
          $sourceName = [System.IO.Path]::GetFileNameWithoutExtension("${{ matrix.archive_source }}")
          $sourceExtension = [System.IO.Path]::GetExtension("${{ matrix.archive_source }}")
          $targetName = "$sourceName $version$sourceExtension"
          Rename-Item -LiteralPath $source -NewName $targetName

      - name: Name Unix app with tag version
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          source="${{ matrix.archive_source }}"

          if [ "${{ matrix.platform }}" = "macos" ]; then
            base="${source%.app}"
            target="${base} ${version}.app"
          else
            target="${source}-${version}"
          fi

          mv "dist/${source}" "dist/${target}"

      - name: Sign macOS app ad-hoc
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          source="${{ matrix.archive_source }}"
          base="${source%.app}"
          versioned_app="${base} ${GITHUB_REF_NAME}.app"

          codesign --force --deep --sign - "dist/${versioned_app}"
          codesign --verify --deep --strict --verbose=2 "dist/${versioned_app}"
          codesign --display --verbose=4 "dist/${versioned_app}"

      - name: Archive Windows app
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $sourceName = [System.IO.Path]::GetFileNameWithoutExtension("${{ matrix.archive_source }}")
          $sourceExtension = [System.IO.Path]::GetExtension("${{ matrix.archive_source }}")
          $targetName = "$sourceName $version$sourceExtension"
          $archiveName = "${{ matrix.archive_base }}-$version${{ matrix.archive_extension }}"

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist\$targetName" -DestinationPath "release\$archiveName" -Force

      - name: Archive Linux app
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.archive_source }}-${version}"

          mkdir -p release
          tar -czf "release/${{ matrix.archive_base }}-${version}${{ matrix.archive_extension }}" -C dist "${target}"

      - name: Archive macOS app
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          source="${{ matrix.archive_source }}"
          base="${source%.app}"
          versioned_app="${base} ${GITHUB_REF_NAME}.app"

          mkdir -p release
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "${versioned_app}" "../release/${{ matrix.archive_base }}-${GITHUB_REF_NAME}${{ matrix.archive_extension }}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: release/${{ matrix.archive_base }}-${{ github.ref_name }}${{ matrix.archive_extension }}
          if-no-files-found: error
          retention-days: 14

  checksums:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download app artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-files
          pattern: ScySeqTools-Analyser-*-${{ github.ref_name }}
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v7
        with:
          name: ScySeqTools-Analyser-SHA256SUMS-${{ github.ref_name }}
          path: release-files/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: checksums
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-files
          pattern: ScySeqTools-Analyser-*-${{ github.ref_name }}
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          ls -lah release-files

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists. Updating assets..."
            gh release upload "$tag" release-files/* --clobber
          else
            echo "Creating release $tag..."
            gh release create "$tag" release-files/* \
              --verify-tag \
              --title "ScySeqTools Analyser ${tag}" \
              --notes "Automated executable builds for Windows, Linux, and macOS."
          fi
